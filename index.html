<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GhostLingua</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <span class="ghost-icon">👻</span>
            <span class="title">GhostLingua</span>
            <div class="shortcuts">ESC to hide</div>
        </div>
        <div class="input-wrapper">
            <input type="text" id="input" placeholder="Escribe en español..." autofocus>
        </div>
        <div class="preview" id="preview">Translation preview will appear here...</div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
